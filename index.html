<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>鐘聲</title>
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    function resetPageScroll() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      if (document.body) document.body.scrollTop = 0;
    }

    function resetPageScrollSoon() {
      resetPageScroll();
      requestAnimationFrame(resetPageScroll);
      setTimeout(resetPageScroll, 0);
      setTimeout(resetPageScroll, 80);
      setTimeout(resetPageScroll, 260);
      setTimeout(resetPageScroll, 800);
    }

    document.addEventListener('DOMContentLoaded', resetPageScrollSoon);
    window.addEventListener('pageshow', resetPageScrollSoon);
    window.addEventListener('load', resetPageScrollSoon);
    window.addEventListener('pagehide', resetPageScroll);

    if (sessionStorage.getItem('returnToMenu') === '1') {
      document.documentElement.classList.add('returning-to-menu');
    }
  </script>
  <style>
    html { -webkit-text-size-adjust: 100%; }

    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-ExtraLight.otf') format('opentype'); font-weight: 200; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-SemiBold.otf') format('opentype'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Heavy.otf') format('opentype'); font-weight: 900; font-display: swap; }
  </style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --ink-quote: #f7f7f7;
      --ink-faint: rgba(0, 0, 0, 0.20);
      --accent: #464e66;
      --menu-base: #a5a5a5;
      --mobile-vh: 100svh;
      --mobile-shell-top: calc(env(safe-area-inset-top) + clamp(38px, 6svh, 56px));
      --mobile-shell-right: calc(env(safe-area-inset-right) + clamp(24px, 7vw, 52px));
      --mobile-shell-bottom: calc(env(safe-area-inset-bottom) + clamp(28px, 5svh, 52px));
      --mobile-shell-left: calc(env(safe-area-inset-left) + clamp(24px, 7vw, 52px));
    }

    @supports (height: 100dvh) {
      :root {
        --mobile-vh: 100dvh;
        --mobile-shell-top: calc(env(safe-area-inset-top) + clamp(38px, 6dvh, 56px));
        --mobile-shell-bottom: calc(env(safe-area-inset-bottom) + clamp(28px, 5dvh, 52px));
      }
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Source Han Serif TC', 'Noto Serif TC', 'Songti TC', 'Songti SC', 'SimSun', serif;
      font-weight: 600;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    img, a {
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    .stage {
      position: relative;
      width: 100vw;
      min-height: 100svh;
      min-height: var(--mobile-vh);
      overflow: hidden;
      isolation: isolate;
    }

    html.returning-to-menu .stage {
      opacity: 0;
      transform: translateX(-8vw) scale(0.97);
      animation: indexReturnEnter 0.80s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.04s;
    }

    html.leaving-to-about .stage {
      animation: leaveToAbout 0.48s cubic-bezier(0.55, 0, 1, 0.45) forwards;
      pointer-events: none;
    }

    @keyframes leaveToAbout {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(-8vw) scale(0.97); }
    }

    @keyframes indexReturnEnter {
      from {
        opacity: 0;
        transform: translateX(-8vw) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    /* ── 中央正方形引言框 ── */
    .quote-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      border: 1px solid var(--ink-faint);
      width: min(72vh, 62vw, 720px);
      height: min(72vh, 62vw, 720px);
      overflow: hidden;
      will-change: transform;
      touch-action: none;
      padding: clamp(14px, 2vmin, 28px);
    }

    .quote-grid {
      display: grid;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .quote-grid .char {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-quote);
      transition: color 0.2s ease;
      line-height: 1;
      font-size: clamp(34px, 8.6vmin, 96px);
      font-weight: 700;
    }

    /* ── 右下角主標題 ── */
    .site-title {
      position: absolute;
      bottom: 7vh;
      right: 6vw;
      color: rgba(0, 0, 0, 0.92);
      font-size: clamp(13px, 1.1vw, 18px);
      letter-spacing: 0.6em;
      line-height: 2.2;
      text-align: right;
      font-weight: 600;
      will-change: opacity;
    }

    /* ── 右側選單（桌面版，滾動後浮現） ── */
    .menu-nav {
      position: absolute;
      left: calc(50% - 14vw + min(23.76vh, 20.46vw, 237.6px) + clamp(72px, 6vw, 96px));
      top: 50%;
      transform: translateY(-50%) translateX(60vw);
      opacity: 0;
      display: flex;
      flex-direction: column;
      gap: 4vh;
      will-change: transform, opacity;
    }

    .menu-item {
      font-size: clamp(13px, 1.1vw, 18px);
      letter-spacing: 0.6em;
      color: var(--menu-base);
      cursor: pointer;
      transition: color 0.32s ease;
      font-weight: 600;
      background: none;
      border: none;
      font-family: inherit;
      text-align: right;
      padding: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover: hover) and (pointer: fine) {
      .menu-item:hover { color: var(--accent); }
    }
    .menu-item:active { color: var(--accent); }

    /* ── 手機版選單（垂直欄位排列） ── */
    .menu-nav-mobile {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, 45vh);
      opacity: 0;
      flex-direction: row-reverse;
      justify-content: center;
      gap: 5vw;
      will-change: transform, opacity;
    }

    .menu-item-mobile {
      writing-mode: vertical-rl;
      font-size: clamp(13px, 3.6vw, 16px);
      letter-spacing: 0.45em;
      color: var(--menu-base);
      cursor: pointer;
      transition: color 0.32s ease;
      font-weight: 600;
      background: none;
      border: none;
      font-family: inherit;
      text-align: center;
      padding: 0;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-item-mobile:active { color: var(--accent); }

    /* ── 滾動提示線 ── */
    .scroll-hint {
      position: absolute;
      bottom: 6vh;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 36px;
      overflow: hidden;
      will-change: opacity;
    }
    .scroll-hint::after {
      content: '';
      display: block;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.3), transparent);
      animation: scrollDrop 2s ease-in-out infinite;
    }
    @keyframes scrollDrop {
      0%   { transform: translateY(-100%); opacity: 0; }
      30%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translateY(200%); opacity: 0; }
    }

    /* ── 首次進入提示 ── */
    .swipe-hint {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    .swipe-hint.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .swipe-hint-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.4vh;
      width: min(82vw, 560px);
    }
    .swipe-hint-icon {
      width: 28px;
      height: 28px;
      opacity: 0.45;
    }
    .swipe-hint-text {
      color: rgba(0, 0, 0, 0.5);
      font-size: clamp(12px, 1.5vmin, 16px);
      letter-spacing: 0.18em;
      line-height: 2.1;
      font-weight: 600;
      text-align: center;
    }
    .swipe-hint-note {
      display: block;
      margin-top: 0.4em;
    }

    /* ── 手機版 ── */
    @media (max-width: 768px) {
      html,
      body {
        height: var(--mobile-vh);
        min-height: var(--mobile-vh);
        overflow: hidden;
      }

      .stage {
        height: var(--mobile-vh);
        min-height: 0;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        overflow: hidden;
        padding: var(--mobile-shell-top) var(--mobile-shell-right) var(--mobile-shell-bottom) var(--mobile-shell-left);
      }

      .quote-box {
        width: min(75vw, 75vmin);
        height: min(75vw, 75vmin);
        padding: clamp(14px, 4vmin, 24px);
      }
      .quote-grid .char {
        font-size: clamp(20px, 7vmin, 48px);
      }
      .site-title {
        bottom: var(--mobile-shell-bottom);
        right: var(--mobile-shell-right);
        font-size: clamp(12px, 3vw, 15px);
        letter-spacing: 0.5em;
      }
      .menu-nav {
        display: none;
      }
      .menu-nav-mobile {
        display: flex;
      }
    }
  </style>
</head>
<body>

<main class="stage">

  <div id="quote-box" class="quote-box" aria-label="主視覺引言區塊">
    <div id="quote-grid" class="quote-grid"></div>
  </div>

  <div id="site-title" class="site-title">
    鐘　聲<br>
    個人主頁
  </div>

  <nav id="menu-nav" class="menu-nav" aria-label="主要導覽">
    <a class="menu-item" href="about.html">鐘聲是誰</a>
    <a class="menu-item" href="serial.html">連載作品</a>
    <a class="menu-item" href="misc.html">各種各種</a>
    <a class="menu-item" href="discord.html">見字寫文</a>
    <a class="menu-item" href="contact.html">聯絡方式</a>
  </nav>

  <nav id="menu-nav-mobile" class="menu-nav-mobile" aria-label="主要導覽">
    <a class="menu-item-mobile" href="about.html">鐘聲是誰</a>
    <a class="menu-item-mobile" href="serial.html">連載作品</a>
    <a class="menu-item-mobile" href="misc.html">各種各種</a>
    <a class="menu-item-mobile" href="discord.html">見字寫文</a>
    <a class="menu-item-mobile" href="contact.html">聯絡方式</a>
  </nav>

  <div id="scroll-hint" class="scroll-hint" aria-hidden="true"></div>

  <div id="swipe-hint" class="swipe-hint" role="complementary">
    <div class="swipe-hint-inner">
      <svg class="swipe-hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 3.5C9 2.672 9.672 2 10.5 2s1.5.672 1.5 1.5v7"/>
        <path d="M12 8.5c0-.828.672-1.5 1.5-1.5s1.5.672 1.5 1.5v1M15 9.5c0-.828.672-1.5 1.5-1.5S18 8.672 18 9.5v1"/>
        <path d="M18 10.5c0-.828.448-1.5 1-1.5s1 .672 1 1.5V14c0 3.314-2.686 6-6 6h-2a6 6 0 0 1-6-6v-1.083c0-.504.3-.945.756-1.14L8 11.5V8.5c0-.828.672-1.5 1.5-1.5S11 7.672 11 8.5"/>
      </svg>
      <p class="swipe-hint-text">輕觸或移動滑鼠到台詞上，會有特別效果<span class="swipe-hint-note">請使用滾輪或下滑以展開目錄</span></p>
    </div>
  </div>

</main>

<script>
(function () {
  function lockCopyActions() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if ((e.ctrlKey || e.metaKey) && ['a', 'c', 'x'].includes(key)) {
        e.preventDefault();
      }
    });
  }

  lockCopyActions();

  const shouldReturnToMenu = sessionStorage.getItem('returnToMenu') === '1';
  if (shouldReturnToMenu) {
    sessionStorage.removeItem('returnToMenu');
  }

  /* ===== 在這裡改主引言 ===== */
  const QUOTE = '手是應該用來擁抱別人，創造奇蹟，而不是傷害自己。';
  /* ========================== */

  const BASE_RGB  = [247, 247, 247]; // #f7f7f7
  const HOVER_RGB = [192, 198, 204]; // #c0c6cc

  let mobileBaseRGB = [247, 247, 247]; // tracks current mobile char base color

  const quoteEl      = document.getElementById('quote-grid');
  const quoteBoxEl   = document.getElementById('quote-box');
  const navMenuEl    = document.getElementById('menu-nav');
  const navMobileEl  = document.getElementById('menu-nav-mobile');
  const titleEl      = document.getElementById('site-title');
  const hintEl       = document.getElementById('scroll-hint');
  const swipeHintEl  = document.getElementById('swipe-hint');
  const detailLinks  = document.querySelectorAll('a[href="about.html"], a[href="serial.html"], a[href="misc.html"], a[href="discord.html"], a[href="contact.html"]');

  /* ── 首頁進入提示 ── */
  function dismissSwipeHint() {
    swipeHintEl.classList.add('hidden');
  }
  document.addEventListener('click', dismissSwipeHint, { once: true });
  document.addEventListener('touchend', dismissSwipeHint, { once: true, passive: true });
  document.addEventListener('wheel', dismissSwipeHint, { once: true, passive: true });

  /* ── 渲染引言：垂直欄位，從右上往下、再往左 ── */
  const chars = QUOTE.split('');
  const n = chars.length;
  const cols = Math.max(2, Math.floor(Math.sqrt(n)));
  const rows = Math.ceil(n / cols);

  quoteEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  quoteEl.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;

  const charEls = [];
  chars.forEach((ch, i) => {
    const colIndex = Math.floor(i / rows);
    const rowIndex = i % rows;
    const span = document.createElement('span');
    span.className = 'char';
    span.textContent = ch;
    span.style.gridColumn = (cols - colIndex);
    span.style.gridRow = (rowIndex + 1);
    quoteEl.appendChild(span);
    charEls.push(span);
  });

  /* ── 游標漸層淡入 ── */
  let cachedRects = [];

  function cacheRects() {
    cachedRects = charEls.map(el => ({
      el,
      rect: el.getBoundingClientRect()
    }));
  }

  function clearPaint() {
    const [r, g, b] = mobileBaseRGB;
    charEls.forEach(el => { el.style.color = `rgb(${r},${g},${b})`; });
  }

  function paintFromPoint(x, y) {
    if (!cachedRects.length) cacheRects();
    const [br, bg, bb] = mobileBaseRGB;
    cachedRects.forEach(({ el, rect }) => {
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
      const range = Math.max(rect.width, rect.height) * 2.2;
      const t = Math.max(0, 1 - dist / range);
      const smooth = t * t * (3 - 2 * t);
      const r = Math.round(br + smooth * (HOVER_RGB[0] - br));
      const g = Math.round(bg + smooth * (HOVER_RGB[1] - bg));
      const b = Math.round(bb + smooth * (HOVER_RGB[2] - bb));
      el.style.color = `rgb(${r},${g},${b})`;
    });
  }

  quoteBoxEl.addEventListener('pointerenter', cacheRects);
  quoteBoxEl.addEventListener('pointermove', e => paintFromPoint(e.clientX, e.clientY));
  quoteBoxEl.addEventListener('pointerleave', clearPaint);
  quoteBoxEl.addEventListener('touchstart', e => {
    const t = e.touches[0]; if (!t) return;
    cacheRects(); paintFromPoint(t.clientX, t.clientY);
  }, { passive: true });
  quoteBoxEl.addEventListener('touchmove', e => {
    const t = e.touches[0]; if (!t) return;
    paintFromPoint(t.clientX, t.clientY);
  }, { passive: true });
  quoteBoxEl.addEventListener('touchend', clearPaint, { passive: true });

  function paintTouchEvent(e) {
    if (!isMobile()) return;
    const t = e.touches[0]; if (!t) return;
    cacheRects();
    paintFromPoint(t.clientX, t.clientY);
  }

  document.addEventListener('pointerdown', e => {
    if (!isMobile()) return;
    cacheRects();
    paintFromPoint(e.clientX, e.clientY);
  }, { passive: true });
  document.addEventListener('pointermove', e => {
    if (!isMobile()) return;
    paintFromPoint(e.clientX, e.clientY);
  }, { passive: true });
  document.addEventListener('pointerup', () => {
    if (isMobile()) clearPaint();
  }, { passive: true });
  document.addEventListener('touchstart', paintTouchEvent, { passive: true });
  document.addEventListener('touchmove', paintTouchEvent, { passive: true });
  document.addEventListener('touchend', () => {
    if (isMobile()) clearPaint();
  }, { passive: true });

  detailLinks.forEach(link => {
    link.addEventListener('click', e => {
      if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      e.preventDefault();
      sessionStorage.setItem('aboutEntry', '1');
      document.documentElement.classList.add('leaving-to-about');
      window.setTimeout(() => {
        window.location.href = link.href;
      }, 460);
    });
  });

  /* ── 滾動轉場 ── */
  let progress = 0, targetP = 0, rafId = null;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function isMobile() { return window.innerWidth <= 768; }
  function isSmall()  { return window.innerWidth <= 480; }

  function applyProgress(p) {
    if (isMobile()) {
      /* 手機：方框上移，字色同步顯現，選單從下方進入 */
      const endScale  = isSmall() ? 0.78 : 0.76;
      const endShiftY = isSmall() ? -13  : -15;

      const scale   = lerp(1, endScale, p);
      const shiftVh = lerp(0, endShiftY, p);
      quoteBoxEl.style.transform =
        `translate(-50%, calc(-50% + ${shiftVh.toFixed(2)}vh)) scale(${scale.toFixed(4)})`;

      /* 手機維持待掃色，讓手指掃過時才變成 #c0c6cc */
      mobileBaseRGB = [247, 247, 247];
      charEls.forEach(el => { el.style.color = 'rgb(247,247,247)'; });

      const menuStartY = 55;
      const menuEndY   = isSmall() ? 6.5 : 8;
      const menuY = lerp(menuStartY, menuEndY, p);
      navMobileEl.style.transform = `translate(-50%, ${menuY.toFixed(2)}vh)`;
      navMobileEl.style.opacity   = p.toFixed(3);

    } else {
      /* 桌面：方框左移，選單從右側進入 */
      mobileBaseRGB = [247, 247, 247];

      const endScale  = 0.66;
      const endShift  = -14;
      const startNavX = 60;

      const scale   = lerp(1, endScale, p);
      const shiftVw = lerp(0, endShift, p);
      quoteBoxEl.style.transform =
        `translate(calc(-50% + ${shiftVw.toFixed(2)}vw), -50%) scale(${scale.toFixed(4)})`;

      const navX = lerp(startNavX, 0, p);
      navMenuEl.style.transform = `translateY(-50%) translateX(${navX.toFixed(2)}vw)`;
      navMenuEl.style.opacity   = p.toFixed(3);
    }

    titleEl.style.opacity = (1 - p).toFixed(3);
    hintEl.style.opacity  = ((1 - p) * 0.55).toFixed(3);
  }

  function tick() {
    const diff = targetP - progress;
    if (Math.abs(diff) < 0.0003) {
      progress = targetP;
      applyProgress(progress);
      cacheRects();
      rafId = null;
      return;
    }
    progress += diff * 0.075;
    applyProgress(progress);
    rafId = requestAnimationFrame(tick);
  }

  function goTo(dest) {
    targetP = Math.max(0, Math.min(1, dest));
    if (!rafId) rafId = requestAnimationFrame(tick);
  }

  window.addEventListener('wheel', e => {
    e.preventDefault();
    goTo(e.deltaY > 0 ? 1 : 0);
  }, { passive: false });

  let touchStartY = 0;
  window.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', e => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > 40) goTo(dy > 0 ? 1 : 0);
  }, { passive: true });

  window.addEventListener('keydown', e => {
    if (['ArrowDown', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); goTo(1); }
    if (['ArrowUp', 'PageUp'].includes(e.key))         { e.preventDefault(); goTo(0); }
  });

  window.addEventListener('resize', () => {
    applyProgress(progress);
    cacheRects();
  });

  if ('ResizeObserver' in window) {
    new ResizeObserver(cacheRects).observe(quoteBoxEl);
  }

  if (shouldReturnToMenu) {
    progress = 1;
    targetP = 1;
    swipeHintEl.classList.add('hidden');
    applyProgress(1);
    window.setTimeout(() => {
      document.documentElement.classList.remove('returning-to-menu');
    }, 760);
  } else {
    applyProgress(0);
  }
  cacheRects();
})();
</script>
