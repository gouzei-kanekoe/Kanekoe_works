<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>聯絡方式 || 個人主頁</title>
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    function resetPageScroll() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      if (document.body) document.body.scrollTop = 0;
    }

    function resetPageScrollSoon() {
      resetPageScroll();
      requestAnimationFrame(resetPageScroll);
      setTimeout(resetPageScroll, 0);
      setTimeout(resetPageScroll, 80);
      setTimeout(resetPageScroll, 260);
      setTimeout(resetPageScroll, 800);
    }

    document.addEventListener('DOMContentLoaded', resetPageScrollSoon);
    window.addEventListener('pageshow', resetPageScrollSoon);
    window.addEventListener('load', resetPageScrollSoon);
    window.addEventListener('pagehide', resetPageScroll);

    if (sessionStorage.getItem('aboutEntry') === '1') {
      document.documentElement.classList.add('from-index');
    }
  </script>
  <style>
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-ExtraLight.otf') format('opentype'); font-weight: 200; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-SemiBold.otf') format('opentype'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Heavy.otf') format('opentype'); font-weight: 900; font-display: swap; }
    .site-credit {
      position: fixed;
      left: 50%;
      bottom: max(env(safe-area-inset-bottom), 4px);
      transform: translateX(-50%);
      z-index: 50;
      font-size: 8px;
      line-height: 1.2;
      letter-spacing: 0.04em;
      color: rgba(0, 0, 0, 0.22);
      text-align: center;
      white-space: nowrap;
      pointer-events: auto;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .site-credit-char {
      display: inline-block;
      color: rgba(0, 0, 0, 0.22);
      transition: color 0.2s ease;
    }
  </style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --ink: #000000;
      --ink-quote: #f7f7f7;
      --quote-active: #c0c6cc;
      --menu-base: #a5a5a5;
      --mobile-vh: 100svh;
      --mobile-shell-top: calc(env(safe-area-inset-top) + clamp(38px, 6svh, 56px));
      --mobile-shell-right: calc(env(safe-area-inset-right) + clamp(24px, 7vw, 52px));
      --mobile-shell-bottom: calc(env(safe-area-inset-bottom) + clamp(28px, 5svh, 52px));
      --mobile-shell-left: calc(env(safe-area-inset-left) + clamp(24px, 7vw, 52px));
      --accent: #464e66;
    }

    @supports (height: 100dvh) {
      :root {
        --mobile-vh: 100dvh;
        --mobile-shell-top: calc(env(safe-area-inset-top) + clamp(38px, 6dvh, 56px));
        --mobile-shell-bottom: calc(env(safe-area-inset-bottom) + clamp(28px, 5dvh, 52px));
      }
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Source Han Serif TC', 'Noto Serif TC', 'Songti TC', 'Songti SC', 'SimSun', serif;
      font-weight: 600;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    img, a {
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    .about-stage {
      position: relative;
      width: 100vw;
      min-height: 100svh;
      min-height: var(--mobile-vh);
      overflow: hidden;
      isolation: isolate;
      background: #fff;
    }

    .contact-scene {
      display: block;
      position: static;
    }

    html.from-index .about-stage {
      opacity: 0;
      transform: translateX(8vw) scale(0.97);
      animation: aboutEnter 0.80s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.04s;
    }

    html.leaving-to-index .about-stage {
      animation: leaveToIndex 0.48s cubic-bezier(0.55, 0, 1, 0.45) forwards;
      pointer-events: none;
    }

    @keyframes leaveToIndex {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(8vw) scale(0.97); }
    }

    @keyframes aboutEnter {
      from {
        opacity: 0;
        transform: translateX(8vw) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    .quote-field {
      position: absolute;
      left: clamp(44px, 6vw, 104px);
      top: 12vh;
      width: min(46vw, 760px);
      height: 76vh;
      padding: clamp(6px, 1vw, 18px);
      z-index: 0;
      touch-action: none;
    }

    .quote-grid {
      display: grid;
      width: 100%;
      height: 100%;
      align-content: center;
      justify-content: center;
      pointer-events: none;
    }

    .quote-grid .char {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-quote);
      font-size: clamp(48px, 5.8vw, 108px);
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s ease;
    }

    .about-content {
      position: absolute;
      top: clamp(64px, 12vh, 132px);
      right: clamp(52px, 6.2vw, 110px);
      z-index: 1;
      width: clamp(360px, 34vw, 540px);
      height: calc(100dvh - clamp(96px, 15vh, 150px));
      display: grid;
      grid-template-rows: auto auto auto minmax(44px, 1fr);
      justify-items: stretch;
      align-items: start;
    }

    .page-title {
      justify-self: end;
      color: var(--menu-base);
      font-size: clamp(13px, 1.1vw, 18px);
      font-weight: 600;
      letter-spacing: 0.6em;
      line-height: 1.2;
      white-space: nowrap;
    }

    .logo-wrap {
      justify-self: center;
      margin-top: clamp(34px, 5.6vh, 64px);
      width: min(100%, clamp(330px, 27vw, 500px));
      max-height: clamp(240px, 40dvh, 500px);
      aspect-ratio: 1500 / 1640;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .author-logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .bio-scroll {
      align-self: start;
      margin-top: clamp(42px, 6vh, 76px);
      width: 100%;
      height: clamp(142px, 23vh, 240px);
      overflow: auto;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      padding-right: 1.1em;
      line-height: 1.74;
      font-size: clamp(12px, 0.9vw, 15px);
      letter-spacing: 0.06em;
      scrollbar-width: none;
      user-select: none;
    }

    .bio-scroll::-webkit-scrollbar { display: none; }

    .bio-scroll p {
      margin-bottom: 1.35em;
    }

    .bio-scroll.contact-info {
      height: auto;
      overflow: visible;
      padding-right: 0;
      margin-top: clamp(22px, 3.8vh, 42px);
      line-height: 1.62;
    }

    .contact-heading {
      margin-bottom: 0.52em;
      font-size: 1em;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .contact-list {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      column-gap: 0.86em;
      row-gap: 0.34em;
      margin-bottom: 1.28em;
    }

    .contact-list dt,
    .contact-list dd {
      min-width: 0;
      line-height: 1.58;
    }

    .contact-list dt {
      color: rgba(0, 0, 0, 0.62);
      white-space: nowrap;
    }

    .contact-info a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(70, 78, 102, 0.28);
      transition: color 0.32s ease, border-color 0.32s ease;
      overflow-wrap: anywhere;
    }

    @media (hover: hover) and (pointer: fine) {
      .contact-info a:hover {
        color: var(--accent);
        border-color: rgba(70, 78, 102, 0.68);
      }
    }

    .notice-block p {
      margin-bottom: 0.32em;
      line-height: 1.56;
    }

    .work-section + .work-section {

    .work-heading {

      font-weight: 700;
      letter-spacing: 0.1em;

    .work-table {

    }

    .work-table th,

      vertical-align: top;

      line-height: 1.58;

    .work-table th {

      font-weight: 600;
    }

    .work-table td {
      white-space: nowrap;

    .return-link {
      justify-self: end;
      align-self: end;
      margin-bottom: clamp(24px, 4vh, 44px);
      color: var(--menu-base);
      font-size: clamp(13px, 1.1vw, 18px);
      font-weight: 600;
      letter-spacing: 0.6em;
      text-decoration: none;
      transition: color 0.32s ease;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover: hover) and (pointer: fine) {
      .return-link:hover { color: var(--accent); }
    }

    .return-link:active { color: var(--accent); }

    @media (min-width: 769px) and (max-height: 820px) {
      .about-content {
        top: clamp(48px, 8vh, 84px);
        height: calc(100dvh - clamp(72px, 12vh, 112px));
      }

      .logo-wrap {
        margin-top: clamp(18px, 3.2vh, 34px);
        width: min(100%, clamp(270px, 23vw, 390px));
        max-height: clamp(190px, 34dvh, 350px);
      }

      .bio-scroll.contact-info {
        margin-top: clamp(14px, 2.8vh, 24px);
        font-size: clamp(11px, 0.86vw, 14px);
        line-height: 1.54;
      }

      .contact-list {
        row-gap: 0.24em;
        margin-bottom: 0.92em;
      }

      .notice-block p {
        margin-bottom: 0.22em;
        line-height: 1.44;
      }

      .return-link {
        margin-bottom: clamp(12px, 2vh, 24px);
      }

    @media (min-width: 769px) and (max-height: 660px) {
      .about-content {
        top: clamp(36px, 6vh, 62px);
        height: calc(100dvh - clamp(50px, 9vh, 78px));
      }

      .logo-wrap {
        margin-top: clamp(12px, 2.2vh, 22px);
        width: min(100%, clamp(220px, 19vw, 310px));
        max-height: clamp(150px, 29dvh, 250px);
      }

      .bio-scroll.contact-info {
        margin-top: clamp(10px, 2vh, 18px);
        font-size: clamp(10px, 0.8vw, 13px);
        line-height: 1.44;
      }

      .contact-heading {
        margin-bottom: 0.36em;
      }
    }

    @media (max-width: 768px) {
      html,
      body {
        height: auto;
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .about-stage {
        height: auto;
        min-height: 100svh;
        min-height: var(--mobile-vh);
        overflow: hidden;
        padding-bottom: var(--mobile-shell-bottom);
      }

      .contact-scene {
        position: relative;
        display: block;
        width: min(82vw, 460px);
        min-height: var(--mobile-scene-min-height, 0);
        margin: var(--mobile-shell-top) auto var(--mobile-shell-bottom);
        overflow: hidden;
        overflow: clip;
        isolation: isolate;
      }

      .quote-field {
        position: absolute;
        left: var(--mobile-quote-left, 0);
        top: var(--mobile-quote-top, 0);
        transform: none;
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        padding: 0;
        z-index: 0;
      }

      .quote-grid .char {
        width: var(--quote-cell, 44px);
        height: var(--quote-cell, 44px);
        font-size: clamp(34px, 11vw, 54px);
      }

      .quote-grid {
        align-content: start;
        justify-content: start;
      }

      .about-content {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        bottom: auto;
        transform: none;
        margin: 0;
        width: 100%;
        height: auto;
        min-height: 0;
        grid-template-rows: auto auto auto;
        row-gap: clamp(16px, 3.4dvh, 30px);
        overflow: hidden;
        overflow: clip;
      }

      .page-title {
        position: fixed;
        top: var(--mobile-shell-top);
        right: var(--mobile-shell-right);
        z-index: 20;
        margin: 0;
        justify-self: end;
        font-size: clamp(13px, 3.6vw, 16px);
        letter-spacing: 0.45em;
        line-height: 1.2;
        white-space: nowrap;
      }

      .logo-wrap {
        grid-row: 2;
        position: relative;
        z-index: 1;
        margin-top: 0;
        width: min(74vw, 360px);
      }

      .bio-scroll {
        margin-top: 0;
        height: auto;
        min-height: 0;
        padding-right: 0.75em;
        font-size: clamp(10px, 2.7vw, 13px);
        line-height: 1.66;
        letter-spacing: 0.04em;
      }

      .bio-scroll.contact-info {
        grid-row: 3;
        position: relative;
        z-index: 1;
        max-width: 100%;
        height: auto;
        overflow: hidden;
        overflow: clip;
        padding-right: 0;
        margin-top: 0;
        line-height: 1.52;
      }

      .contact-heading {
        margin-bottom: 0.42em;
      }

      .contact-list {
        max-width: 100%;
        column-gap: 0.62em;
        row-gap: 0.18em;
        margin-bottom: 0.92em;
      }

      .contact-list dd,
      .notice-block p {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .notice-block p {
        margin-bottom: 0.22em;
        line-height: 1.44;
      }

      .work-table th,
      .work-table td {
        padding-right: 0.65em;
        line-height: 1.48;
      }

      .work-table th {
        width: 48%;
      }

      .work-table td {
        white-space: normal;
      }

      .return-link {
        position: fixed;
        top: var(--mobile-shell-top);
        left: var(--mobile-shell-left);
        right: auto;
        bottom: auto;
        z-index: 20;
        margin: 0;
        justify-self: auto;
        align-self: auto;
        font-size: clamp(13px, 3.6vw, 16px);
        letter-spacing: 0.45em;
        line-height: 1.2;
        white-space: nowrap;
      }
    }

    @media (max-width: 380px) {
      .contact-scene {
        width: 84vw;
      }

      .about-content {
        row-gap: clamp(14px, 3dvh, 26px);
      }

      .return-link {
        left: var(--mobile-shell-left);
      }

      .quote-field {
        width: 100%;
      }

      .bio-scroll {
        height: auto;
      }
    }
  </style>
</head>

<script>
(function () {
  function lockCopyActions() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if ((e.ctrlKey || e.metaKey) && ['a', 'c', 'x'].includes(key)) {
        e.preventDefault();
      }
    });
  }

  lockCopyActions();

  sessionStorage.removeItem('aboutEntry');

  const QUOTE = '我有許多想法，希望能夠與你相遇，尋求合作機會。';
  const BASE_RGB = [247, 247, 247];
  const HOVER_RGB = [192, 198, 204];
  const CREDIT_BASE_RGB = [156, 156, 156];
  const CREDIT_HOVER_RGB = [92, 92, 92];

  const quoteFieldEl = document.getElementById('quote-field');
  const quoteGridEl = document.getElementById('quote-grid');
  const contactSceneEl = document.getElementById('contact-scene');
  const returnLinkEl = document.querySelector('.return-link');
  const aboutContentEl = document.querySelector('.about-content');
  const contactInfoEl = document.querySelector('.bio-scroll.contact-info');
  const logoWrapEl = document.querySelector('.logo-wrap');
  let creditEl = null;
  let creditChars = [];
  let creditCharSet = new Set();

  function initCredit() {
    creditEl = document.getElementById('site-credit');
    if (!creditEl || creditChars.length) return;

    const creditText = creditEl.textContent || '';
    creditEl.textContent = '';
    Array.from(creditText).forEach(ch => {
      const span = document.createElement('span');
      span.className = 'site-credit-char';
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      creditEl.appendChild(span);
      creditChars.push(span);
    });
    creditCharSet = new Set(creditChars);
  }

  let charEls = [];
  let cachedRects = [];

  function getQuoteLayout(length) {
    if (!isMobileViewport()) {
      const cols = Math.max(2, Math.floor(Math.sqrt(length)));
      return { cols, rows: Math.ceil(length / cols), cellSize: '' };
    }

    const rect = quoteFieldEl.getBoundingClientRect();
    const fieldWidth = rect.width || Math.min(window.innerWidth * 0.82, 440);
    const fieldHeight = rect.height || fieldWidth;
    let best = { cols: length, rows: 1, cellSize: Math.max(24, Math.floor(fieldWidth / Math.max(1, length))) };

    for (let rows = 1; rows <= length; rows += 1) {
      const cols = Math.ceil(length / rows);
      const cellSize = Math.floor(Math.min(fieldWidth / cols, fieldHeight / rows));
      if (cellSize > best.cellSize) {
        best = { cols, rows, cellSize };
      }
    }

    best.cellSize = Math.max(32, Math.min(best.cellSize, 72));
    return best;
  }

  function syncMobileQuotePosition() {
    if (!contactSceneEl || !contactInfoEl) return;

    if (!isMobileViewport()) {
      quoteFieldEl.style.removeProperty('--mobile-quote-top');
      quoteFieldEl.style.removeProperty('--mobile-quote-left');
      contactSceneEl.style.removeProperty('--mobile-scene-min-height');
      return;
    }

    const sceneRect = contactSceneEl.getBoundingClientRect();
    const contactRect = contactInfoEl.getBoundingClientRect();
    const top = contactRect.top - sceneRect.top - 12;
    const left = contactRect.left - sceneRect.left;
    const quoteRect = quoteFieldEl.getBoundingClientRect();
    const contentRect = aboutContentEl ? aboutContentEl.getBoundingClientRect() : contactRect;
    const sceneMinHeight = Math.ceil(Math.max(
      contentRect.bottom - sceneRect.top,
      top + quoteRect.width
    ));

    quoteFieldEl.style.setProperty('--mobile-quote-top', `${Math.round(top)}px`);
    quoteFieldEl.style.setProperty('--mobile-quote-left', `${Math.round(left)}px`);
    contactSceneEl.style.setProperty('--mobile-scene-min-height', `${sceneMinHeight}px`);
  }

  function buildQuote() {
    syncMobileQuotePosition();

    const chars = QUOTE.split('');
    const { cols, rows, cellSize } = getQuoteLayout(chars.length);

    quoteGridEl.replaceChildren();
    if (isMobileViewport()) {
      quoteGridEl.style.setProperty('--quote-cell', `${cellSize}px`);
      quoteGridEl.style.gridTemplateColumns = `repeat(${cols}, var(--quote-cell))`;
      quoteGridEl.style.gridTemplateRows = `repeat(${rows}, var(--quote-cell))`;
    } else {
      quoteGridEl.style.removeProperty('--quote-cell');
      quoteGridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      quoteGridEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }

    charEls = [];
    chars.forEach((ch, i) => {
      const colIndex = Math.floor(i / rows);
      const rowIndex = i % rows;
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch;
      span.style.gridColumn = (cols - colIndex);
      span.style.gridRow = (rowIndex + 1);
      quoteGridEl.appendChild(span);
      charEls.push(span);
    });

    cacheRects();
  }

  function cacheRects() {
    cachedRects = charEls.concat(creditChars).map(el => ({
      el,
      rect: el.getBoundingClientRect()
    }));
  }

  buildQuote();

  function clearPaint() {
    charEls.forEach(el => { el.style.color = `rgb(${BASE_RGB.join(',')})`; });
    creditChars.forEach(el => { el.style.color = `rgb(${CREDIT_BASE_RGB.join(',')})`; });
  }

  function paintFromPoint(x, y) {
    if (!cachedRects.length) cacheRects();
    cachedRects.forEach(({ el, rect }) => {
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
      const range = Math.max(rect.width, rect.height) * 2.4;
      const t = Math.max(0, 1 - dist / range);
      const smooth = t * t * (3 - 2 * t);
      const base = creditCharSet.has(el) ? CREDIT_BASE_RGB : BASE_RGB;
      const hover = creditCharSet.has(el) ? CREDIT_HOVER_RGB : HOVER_RGB;
      const r = Math.round(base[0] + smooth * (hover[0] - base[0]));
      const g = Math.round(base[1] + smooth * (hover[1] - base[1]));
      const b = Math.round(base[2] + smooth * (hover[2] - base[2]));
      el.style.color = `rgb(${r},${g},${b})`;
    });
  }

  quoteFieldEl.addEventListener('pointerenter', cacheRects);
  quoteFieldEl.addEventListener('pointermove', e => paintFromPoint(e.clientX, e.clientY));
  quoteFieldEl.addEventListener('pointerleave', clearPaint);
  quoteFieldEl.addEventListener('touchstart', e => {
    const t = e.touches[0]; if (!t) return;
    cacheRects(); paintFromPoint(t.clientX, t.clientY);
  }, { passive: true });
  quoteFieldEl.addEventListener('touchmove', e => {
    const t = e.touches[0]; if (!t) return;
    paintFromPoint(t.clientX, t.clientY);
  }, { passive: true });
  quoteFieldEl.addEventListener('touchend', clearPaint, { passive: true });
  document.addEventListener('DOMContentLoaded', () => {
    initCredit();
    if (!creditEl) return;

    creditEl.addEventListener('pointerenter', cacheRects);
    creditEl.addEventListener('pointermove', e => paintFromPoint(e.clientX, e.clientY));
    creditEl.addEventListener('pointerleave', clearPaint);
    creditEl.addEventListener('touchstart', e => {
      const t = e.touches[0]; if (!t) return;
      cacheRects();
      paintFromPoint(t.clientX, t.clientY);
    }, { passive: true });
    creditEl.addEventListener('touchmove', e => {
      const t = e.touches[0]; if (!t) return;
      paintFromPoint(t.clientX, t.clientY);
    }, { passive: true });
    creditEl.addEventListener('touchend', clearPaint, { passive: true });
    clearPaint();
    cacheRects();
  });

  function isMobileViewport() {
    return window.innerWidth <= 768;
  }

  function paintTouchEvent(e) {
    if (!isMobileViewport()) return;
    const t = e.touches[0]; if (!t) return;
    cacheRects();
    paintFromPoint(t.clientX, t.clientY);
  }

  function installSoftScroll(selector) {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    document.querySelectorAll(selector).forEach(scroller => {
      let target = scroller.scrollTop;
      let current = scroller.scrollTop;
      let rafId = 0;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getDelta(e) {
        if (e.deltaMode === 1) return e.deltaY * 18;
        if (e.deltaMode === 2) return e.deltaY * scroller.clientHeight;
        return e.deltaY;
      }

      function step() {
        current += (target - current) * 0.18;

        if (Math.abs(target - current) < 0.5) {
          current = target;
          rafId = 0;
        } else {
          rafId = window.requestAnimationFrame(step);
        }

        scroller.scrollTop = current;
      }

      scroller.addEventListener('wheel', e => {
        const max = scroller.scrollHeight - scroller.clientHeight;
        if (max <= 0) return;

        const delta = getDelta(e);
        const next = clamp(target + delta, 0, max);
        const blocked = (target === 0 && delta < 0) || (target === max && delta > 0);
        if (blocked) return;

        e.preventDefault();
        target = next;
        if (!rafId) {
          current = scroller.scrollTop;
          rafId = window.requestAnimationFrame(step);
        }
      }, { passive: false });

      scroller.addEventListener('scroll', () => {
        if (!rafId) target = scroller.scrollTop;
      }, { passive: true });
    });
  }

  document.addEventListener('pointerdown', e => {
    if (!isMobileViewport()) return;
    cacheRects();
    paintFromPoint(e.clientX, e.clientY);
  }, { passive: true });
  document.addEventListener('pointermove', e => {
    if (!isMobileViewport()) return;
    paintFromPoint(e.clientX, e.clientY);
  }, { passive: true });
  document.addEventListener('pointerup', () => {
    if (isMobileViewport()) clearPaint();
  }, { passive: true });
  document.addEventListener('touchstart', paintTouchEvent, { passive: true });
  document.addEventListener('touchmove', paintTouchEvent, { passive: true });
  document.addEventListener('touchend', () => {
    if (isMobileViewport()) clearPaint();
  }, { passive: true });

  if (returnLinkEl) {
    returnLinkEl.addEventListener('click', e => {
      if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      e.preventDefault();
      sessionStorage.setItem('returnToMenu', '1');
      document.documentElement.classList.add('leaving-to-index');
      window.setTimeout(() => {
        window.location.href = returnLinkEl.href;
      }, 460);
    });
  }

  window.addEventListener('resize', buildQuote);
  window.addEventListener('load', buildQuote);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(buildQuote);
  }
  if ('ResizeObserver' in window) {
    const quoteResizeObserver = new ResizeObserver(buildQuote);
    if (contactSceneEl) quoteResizeObserver.observe(contactSceneEl);
    quoteResizeObserver.observe(quoteFieldEl);
    if (contactInfoEl) quoteResizeObserver.observe(contactInfoEl);
    if (logoWrapEl) quoteResizeObserver.observe(logoWrapEl);
  }
  installSoftScroll('.bio-scroll');
  cacheRects();
})();
</script>
<p id="site-credit" class="site-credit">版權歸鐘聲(かねこえ)所有, 2026</p>
