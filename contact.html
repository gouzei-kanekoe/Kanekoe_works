<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>聯絡方式｜鐘聲</title>
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    function resetPageScroll() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      if (document.body) document.body.scrollTop = 0;
    }

    function resetPageScrollSoon() {
      resetPageScroll();
      requestAnimationFrame(resetPageScroll);
      setTimeout(resetPageScroll, 0);
      setTimeout(resetPageScroll, 120);
    }

    document.addEventListener('DOMContentLoaded', resetPageScrollSoon);
    window.addEventListener('pageshow', resetPageScrollSoon);

    if (sessionStorage.getItem('aboutEntry') === '1') {
      document.documentElement.classList.add('from-index');
    }
  </script>
  <style>
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-ExtraLight.otf') format('opentype'); font-weight: 200; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Medium.otf') format('opentype'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-SemiBold.otf') format('opentype'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'Source Han Serif TC'; src: url('FONTS/SourceHanSerifTC-Heavy.otf') format('opentype'); font-weight: 900; font-display: swap; }
  </style>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --ink: #000000;
      --ink-quote: #f5f5f5;
      --quote-active: #c0c6cc;
      --menu-base: #a5a5a5;
      --accent: #464e66;
    }

    html, body {
      width: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Source Han Serif TC', 'Noto Serif TC', 'Songti TC', 'Songti SC', 'SimSun', serif;
      font-weight: 600;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-text-size-adjust: 100%;
    }

    img, a {
      -webkit-user-drag: none;
      -webkit-touch-callout: none;
    }

    .about-stage {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 28px) clamp(22px, 5vw, 48px) calc(env(safe-area-inset-bottom) + 32px);
      isolation: isolate;
      background: #fff;
    }

    html.from-index .about-stage {
      opacity: 0;
      transform: translateX(8vw) scale(0.97);
      animation: aboutEnter 0.80s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.04s;
    }

    html.leaving-to-index .about-stage {
      animation: leaveToIndex 0.48s cubic-bezier(0.55, 0, 1, 0.45) forwards;
      pointer-events: none;
    }

    @keyframes leaveToIndex {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(8vw) scale(0.97); }
    }

    @keyframes aboutEnter {
      from { opacity: 0; transform: translateX(8vw) scale(0.97); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1em;
      margin-bottom: clamp(24px, 4vw, 36px);
    }

    .page-title,
    .return-link {
      color: var(--menu-base);
      font-size: clamp(13px, 2.2vw, 18px);
      font-weight: 600;
      letter-spacing: 0.45em;
      line-height: 1.25;
      margin-top: 0;
      padding-top: 0;
      white-space: nowrap;
    }

    .page-title { text-align: right; }

    .return-link {
      text-decoration: none;
      transition: color 0.32s ease;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover: hover) and (pointer: fine) {
      .return-link:hover { color: var(--accent); }
    }

    .return-link:active { color: var(--accent); }

    .hero {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: clamp(8px, 2vw, 14px) 0 clamp(10px, 3vw, 18px);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: clip;
    }

    .quote-field {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.9;
      padding: 0;
      touch-action: none;
    }

    .quote-grid {
      display: grid;
      width: 100%;
      height: 100%;
      align-content: center;
      justify-content: center;
      pointer-events: none;
    }

    .quote-grid .char {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-quote);
      font-size: clamp(46px, 9vw, 86px);
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s ease;
    }

    .logo-wrap {
      position: relative;
      z-index: 1;
      width: min(88vw, 420px);
      aspect-ratio: 1500 / 1640;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .author-logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .contact-info {
      width: 100%;
      max-width: 640px;
      margin: clamp(20px, 4vw, 34px) auto 0;
      line-height: 1.64;
      font-size: clamp(16px, 2.5vw, 30px);
      letter-spacing: 0.04em;
    }

    .contact-heading {
      margin-bottom: 0.48em;
      font-size: 1em;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .contact-list {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      column-gap: 0.8em;
      row-gap: 0.24em;
      margin-bottom: 1.2em;
    }

    .contact-list dt,
    .contact-list dd {
      min-width: 0;
      line-height: 1.52;
    }

    .contact-list dt {
      color: rgba(0, 0, 0, 0.62);
      white-space: nowrap;
    }

    .contact-info a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(70, 78, 102, 0.28);
      transition: color 0.32s ease, border-color 0.32s ease;
      overflow-wrap: anywhere;
    }

    @media (hover: hover) and (pointer: fine) {
      .contact-info a:hover {
        color: var(--accent);
        border-color: rgba(70, 78, 102, 0.68);
      }
    }

    .notice-block p {
      margin-bottom: 0.26em;
      line-height: 1.5;
    }

    .contact-list dd,
    .notice-block p {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .about-stage {
        padding-left: 24px;
        padding-right: 24px;
      }

      .topbar {
        margin-bottom: 20px;
      }

      .page-title,
      .return-link {
        font-size: 15px;
        letter-spacing: 0.42em;
      }

      .hero {
        max-width: 420px;
      }

      .quote-grid .char {
        font-size: clamp(38px, 12vw, 60px);
      }

      .contact-info {
        font-size: clamp(12px, 4.7vw, 21px);
        margin-top: 18px;
      }
    }
  </style>
</head>
<body>
<main class="about-stage">
  <section class="topbar" aria-label="頁首導覽">
    <a class="return-link" href="index.html">返回目錄</a>
    <h1 id="about-title" class="page-title">聯絡方式</h1>
  </section>

  <section class="hero" aria-label="主視覺區">
    <section id="quote-field" class="quote-field" aria-label="主視覺引言">
      <div id="quote-grid" class="quote-grid"></div>
    </section>

    <div class="logo-wrap">
      <img class="author-logo" src="pic/ILLUST.png" alt="鐘聲">
    </div>
  </section>

  <section class="contact-info" tabindex="0" aria-labelledby="about-title">
    <section aria-label="工作聯絡">
      <h2 class="contact-heading">工作聯絡：</h2>
      <dl class="contact-list">
        <dt>Email:</dt>
        <dd><a href="mailto:gouzeii@icloud.com">gouzeii@icloud.com</a></dd>
        <dt>WhatsApp:</dt>

    <section class="notice-block" aria-label="特別注意">
      <h2 class="contact-heading">特別注意：</h2>
      <p>⛔️嚴禁無斷轉載所有圖文⛔️</p>
      <p>⛔️嚴禁擅自使用本人發表的圖文交給 AI⛔️</p>
      <p>（包括但不限於參考生成，評論，重製等用途）</p>
    </section>
  </section>
</main>

<script>
(function () {
  function lockCopyActions() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if ((e.ctrlKey || e.metaKey) && ['a', 'c', 'x'].includes(key)) {
        e.preventDefault();
      }
    });
  }

  lockCopyActions();
  sessionStorage.removeItem('aboutEntry');

  const QUOTE = '我有許多想法，希望能夠與你相遇，尋求合作機會。';
  const BASE_RGB = [245, 245, 245];
  const HOVER_RGB = [192, 198, 204];

  const quoteFieldEl = document.getElementById('quote-field');
  const quoteGridEl = document.getElementById('quote-grid');
  const returnLinkEl = document.querySelector('.return-link');

  let charEls = [];
  let cachedRects = [];

  function getQuoteLayout(length) {
    const rect = quoteFieldEl.getBoundingClientRect();
    const fieldWidth = rect.width || 320;
    const fieldHeight = rect.height || 320;
    let best = { cols: length, rows: 1, cellSize: Math.max(24, Math.floor(fieldWidth / Math.max(1, length))) };

    for (let rows = 1; rows <= length; rows += 1) {
      const cols = Math.ceil(length / rows);
      const cellSize = Math.floor(Math.min(fieldWidth / cols, fieldHeight / rows));
      if (cellSize > best.cellSize) best = { cols, rows, cellSize };
    }

    best.cellSize = Math.max(30, Math.min(best.cellSize, 68));
    return best;
  }

  function buildQuote() {
    const chars = QUOTE.split('');
    const { cols, rows, cellSize } = getQuoteLayout(chars.length);

    quoteGridEl.replaceChildren();
    quoteGridEl.style.setProperty('--quote-cell', `${cellSize}px`);
    quoteGridEl.style.gridTemplateColumns = `repeat(${cols}, var(--quote-cell))`;
    quoteGridEl.style.gridTemplateRows = `repeat(${rows}, var(--quote-cell))`;

    charEls = [];
    chars.forEach((ch, i) => {
      const colIndex = Math.floor(i / rows);
      const rowIndex = i % rows;
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch;
      span.style.gridColumn = (cols - colIndex);
      span.style.gridRow = (rowIndex + 1);
      quoteGridEl.appendChild(span);
      charEls.push(span);
    });

    cacheRects();
  }

  function cacheRects() {
    cachedRects = charEls.map(el => ({ el, rect: el.getBoundingClientRect() }));
  }

  function clearPaint() {
    charEls.forEach(el => { el.style.color = `rgb(${BASE_RGB.join(',')})`; });
  }

  function paintFromPoint(x, y) {
    if (!cachedRects.length) cacheRects();
    cachedRects.forEach(({ el, rect }) => {
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
      const range = Math.max(rect.width, rect.height) * 2.3;
      const t = Math.max(0, 1 - dist / range);
      const smooth = t * t * (3 - 2 * t);
      const r = Math.round(BASE_RGB[0] + smooth * (HOVER_RGB[0] - BASE_RGB[0]));
      const g = Math.round(BASE_RGB[1] + smooth * (HOVER_RGB[1] - BASE_RGB[1]));
      const b = Math.round(BASE_RGB[2] + smooth * (HOVER_RGB[2] - BASE_RGB[2]));
      el.style.color = `rgb(${r},${g},${b})`;
    });
  }

  quoteFieldEl.addEventListener('pointerenter', cacheRects);
  quoteFieldEl.addEventListener('pointermove', e => paintFromPoint(e.clientX, e.clientY));
  quoteFieldEl.addEventListener('pointerleave', clearPaint);

  if (returnLinkEl) {
    returnLinkEl.addEventListener('click', e => {
      if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
      e.preventDefault();
      sessionStorage.setItem('returnToMenu', '1');
      document.documentElement.classList.add('leaving-to-index');
      window.setTimeout(() => {
        window.location.href = returnLinkEl.href;
      }, 460);
    });
  }

  buildQuote();
  window.addEventListener('resize', buildQuote);
  window.addEventListener('load', buildQuote);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(buildQuote);
  }
  if ('ResizeObserver' in window) {
    const quoteResizeObserver = new ResizeObserver(buildQuote);
    quoteResizeObserver.observe(quoteFieldEl);
  }
  cacheRects();
})();
</script>
</body>
</html>
